name: Keep Render Backend Alive

on:
  schedule:
    # Runs every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    name: Ping Render Backend
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping health endpoint
        run: |
          echo "Pinging Render backend at $(date -u)"

          RESPONSE=$(curl --silent --max-time 30 --write-out "\n%{http_code}" \
            "https://revluma.onrender.com/api/health")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Backend is alive (HTTP $HTTP_CODE)"
          else
            echo "⚠️ Backend returned HTTP $HTTP_CODE — may still be waking up"
          fi