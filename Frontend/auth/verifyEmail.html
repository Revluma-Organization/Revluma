<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="../assets/images/Revluma-icon.png">
  <title>Revluma - Verify Email</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap"
    rel="stylesheet">
  <script src="../assets/js/apiConfig.js"></script>
  <style>
    :root {
      --bg: #060608;
      --surface: rgba(255, 255, 255, 0.028);
      --surface-hover: rgba(255, 255, 255, 0.048);
      --border: rgba(255, 255, 255, 0.07);
      --border-focus: rgba(255, 255, 255, 0.22);
      --text: #f0f0f5;
      --muted: #5a5a72;
      --muted2: #3a3a50;
      --accent: #7c6fff;
      --red: #f87171;
      --green: #34d399;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.018;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px;
    }

    .glow-1 {
      position: fixed; width: 500px; height: 500px; top: -160px; left: -160px;
      background: radial-gradient(circle, rgba(124, 111, 255, 0.055) 0%, transparent 70%);
      border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0;
    }
    .glow-2 {
      position: fixed; width: 400px; height: 400px; bottom: -100px; right: -100px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.025) 0%, transparent 70%);
      border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0;
    }

    .code-box {
      width: 48px; height: 56px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text);
      text-align: center;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      caret-color: var(--accent);
    }
    .code-box:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.06);
    }
    .code-box.filled {
      border-color: var(--green);
    }
    .code-box.error {
      border-color: var(--red) !important;
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in { animation: fadeSlideIn 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); }

    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(124, 111, 255, 0.25); }
      70% { box-shadow: 0 0 0 12px rgba(124, 111, 255, 0); }
      100% { box-shadow: 0 0 0 0 rgba(124, 111, 255, 0); }
    }
    .pulse-icon { animation: pulse-ring 2s ease infinite; }

    .btn-primary {
      background: linear-gradient(135deg, #ffffff, #e0e0e0);
      color: #060608;
      font-weight: 600;
      font-size: 0.95rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-primary:hover { opacity: 0.92; transform: translateY(-1px); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-secondary {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-weight: 500;
      font-size: 0.875rem;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-secondary:hover { background: var(--surface-hover); border-color: rgba(255,255,255,0.15); }

    .spinner {
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .countdown { font-variant-numeric: tabular-nums; }

    @media (max-width: 480px) {
      .code-box { width: 42px; height: 50px; font-size: 1.25rem; }
    }
  </style>
</head>

<body>
  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <div class="min-h-screen flex flex-col items-center justify-start" style="position: relative; z-index: 1;">

    <!-- Header Logo -->
    <div class="w-full flex justify-between items-center py-5 px-6 sm:px-8 absolute top-0 left-0">
      <a href="/" class="flex items-center gap-2.5" style="text-decoration:none;">
        <div class="w-8 h-8 rounded-lg overflow-hidden flex items-center justify-center">
          <img src="../assets/images/Revluma-logo.png" alt="Revluma Logo" class="w-full h-full object-contain">
        </div>
        <div>
          <span class="text-lg font-bold bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">Revluma</span>
        </div>
      </a>
    </div>

    <!-- Content -->
    <div class="flex-1 flex items-start justify-center px-4 pb-16 w-full">
      <div class="w-full max-w-[440px] animate-in">

        <!-- Mail Icon -->
        <div class="flex justify-center mb-8">
          <div class="w-16 h-16 rounded-2xl flex items-center justify-center pulse-icon" style="background: var(--surface); border: 1px solid var(--border);">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color: var(--accent);">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
            </svg>
          </div>
        </div>

        <!-- Heading -->
        <div class="text-center mb-8">
          <h1 class="text-2xl sm:text-3xl font-bold mb-2 leading-tight">Check your inbox</h1>
          <p style="color: var(--muted);">We've sent a 6-digit code to</p>
          <p class="font-semibold mt-1" id="displayEmail" style="color: var(--text);">user@example.com</p>
        </div>

        <!-- Code Input -->
        <form id="verifyForm" class="space-y-6">
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider mb-3" style="color: var(--muted);">Verification Code</label>
            <div class="flex justify-center gap-3" id="codeContainer">
              <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-box" data-index="0" autocomplete="one-time-code">
              <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-box" data-index="1">
              <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-box" data-index="2">
              <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-box" data-index="3">
              <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-box" data-index="4">
              <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-box" data-index="5">
            </div>
            <p id="codeError" class="text-xs text-center mt-2 hidden" style="color: var(--red);"></p>
          </div>

          <!-- Timer & Resend -->
          <div class="flex items-center justify-between text-xs" style="color: var(--muted);">
            <span id="timerText">Code expires in <span id="expiryTimer" class="countdown font-semibold" style="color: var(--text);">15:00</span></span>
            <button type="button" id="resendBtn" class="font-medium transition-colors disabled:opacity-40" style="color: var(--accent);" disabled>
              Resend (<span id="resendCountdown" class="countdown">60</span>s)
            </button>
          </div>

          <!-- Verify Button -->
          <button type="submit" id="verifyBtn" class="btn-primary w-full py-3.5 flex items-center justify-center gap-2" disabled>
            <span id="verifyBtnText">Verify & Continue</span>
            <svg id="verifyBtnSpinner" class="w-4 h-4 spinner hidden" fill="none" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="40" stroke-dashoffset="10" stroke-linecap="round"/>
            </svg>
          </button>

          <!-- Back -->
          <div class="flex items-center justify-between">
            <button type="button" id="backBtn" class="btn-secondary px-5 py-2.5 text-sm">← Back</button>
            <p class="text-sm" style="color: var(--muted);">
              Wrong email? <a href="signUp" class="font-medium hover:underline" style="color: var(--text);">Change it</a>
            </p>
          </div>
        </form>

      </div>
    </div>

    <!-- Footer -->
    <div class="pb-6">
      <p style="font-size: 11px; color: var(--muted2); text-align: center; letter-spacing: 0.02em;">
        Protected by Revluma &nbsp;·&nbsp;
        <a href="../pages/privacyPolicy" style="color: inherit; text-decoration: none;">Privacy</a> &nbsp;·&nbsp;
        <a href="../pages/termsOfService" style="color: inherit; text-decoration: none;">Terms</a>
      </p>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // ================================================================
      //  STATE
      // ================================================================
      const email = localStorage.getItem('signup_email') || 'user@example.com';
      document.getElementById('displayEmail').textContent = email;

      const codeInputs = document.querySelectorAll('.code-box');
      const verifyBtn = document.getElementById('verifyBtn');
      const verifyBtnText = document.getElementById('verifyBtnText');
      const verifyBtnSpinner = document.getElementById('verifyBtnSpinner');
      const codeError = document.getElementById('codeError');
      const resendBtn = document.getElementById('resendBtn');
      const resendCountdown = document.getElementById('resendCountdown');
      const expiryTimer = document.getElementById('expiryTimer');

      // ================================================================
      //  CODE INPUT LOGIC
      // ================================================================
      codeInputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
          const val = e.target.value.replace(/[^0-9]/g, '');
          e.target.value = val;

          if (val) {
            e.target.classList.add('filled');
            if (index < codeInputs.length - 1) {
              codeInputs[index + 1].focus();
            }
          } else {
            e.target.classList.remove('filled');
          }

          // Enable verify button when all 6 digits filled
          const code = getCode();
          verifyBtn.disabled = code.length < 6;

          // Clear error state
          codeError.classList.add('hidden');
          codeInputs.forEach(i => i.classList.remove('error'));
        });

        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !e.target.value && index > 0) {
            codeInputs[index - 1].focus();
            codeInputs[index - 1].value = '';
            codeInputs[index - 1].classList.remove('filled');
          }
        });

        // Allow paste of full code
        input.addEventListener('paste', (e) => {
          e.preventDefault();
          const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '');
          paste.split('').forEach((char, i) => {
            if (codeInputs[i]) {
              codeInputs[i].value = char;
              codeInputs[i].classList.add('filled');
            }
          });
          const lastIndex = Math.min(paste.length, codeInputs.length) - 1;
          if (lastIndex >= 0) codeInputs[lastIndex].focus();
          verifyBtn.disabled = getCode().length < 6;
        });
      });

      // Focus first input on page load
      codeInputs[0].focus();

      function getCode() {
        return Array.from(codeInputs).map(i => i.value).join('');
      }

      // ================================================================
      //  VERIFY SUBMIT
      // ================================================================
      document.getElementById('verifyForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const code = getCode();
        if (code.length < 6) return;

        // Show loading state
        verifyBtn.disabled = true;
        verifyBtnText.textContent = 'Verifying...';
        verifyBtnSpinner.classList.remove('hidden');

        try {
          // ── Backend Integration Point ──
          // Replace this with your actual API call:
          // const res = await fetch(`${API_BASE}/auth/verify-email`, {
          //   method: 'POST',
          //   headers: { 'Content-Type': 'application/json' },
          //   body: JSON.stringify({ email, code })
          // });
          // const data = await res.json();
          // if (!res.ok) throw new Error(data.message || 'Invalid code');

          // Simulated verification (2 second delay)
          await new Promise(resolve => setTimeout(resolve, 1500));

          // For demo: accept any 6-digit code
          // In production, validate against your backend response

          // Success — redirect to onboarding
          window.location.href = 'onboarding';

        } catch (err) {
          // Show error
          codeError.textContent = err.message || 'Invalid verification code. Please try again.';
          codeError.classList.remove('hidden');
          codeInputs.forEach(i => i.classList.add('error'));

          verifyBtn.disabled = false;
          verifyBtnText.textContent = 'Verify & Continue';
          verifyBtnSpinner.classList.add('hidden');
        }
      });

      // ================================================================
      //  RESEND COUNTDOWN (60s)
      // ================================================================
      let resendSeconds = 60;
      const resendInterval = setInterval(() => {
        resendSeconds--;
        resendCountdown.textContent = resendSeconds;
        if (resendSeconds <= 0) {
          clearInterval(resendInterval);
          resendBtn.disabled = false;
          resendBtn.innerHTML = 'Resend code';
        }
      }, 1000);

      resendBtn.addEventListener('click', async () => {
        resendBtn.disabled = true;
        resendBtn.textContent = 'Sending...';

        try {
          // ── Backend Integration Point ──
          // await fetch(`${API_BASE}/auth/resend-code`, {
          //   method: 'POST',
          //   headers: { 'Content-Type': 'application/json' },
          //   body: JSON.stringify({ email })
          // });

          await new Promise(resolve => setTimeout(resolve, 1000));

          // Reset countdown
          resendSeconds = 60;
          resendBtn.innerHTML = 'Resend (<span id="resendCountdown" class="countdown">60</span>s)';
          const newCountdown = resendBtn.querySelector('#resendCountdown');
          const newInterval = setInterval(() => {
            resendSeconds--;
            newCountdown.textContent = resendSeconds;
            if (resendSeconds <= 0) {
              clearInterval(newInterval);
              resendBtn.disabled = false;
              resendBtn.innerHTML = 'Resend code';
            }
          }, 1000);

        } catch (err) {
          resendBtn.textContent = 'Failed, try again';
          resendBtn.disabled = false;
        }
      });

      // ================================================================
      //  EXPIRY TIMER (15 min)
      // ================================================================
      let expirySeconds = 15 * 60; // 15 minutes
      const expiryInterval = setInterval(() => {
        expirySeconds--;
        const mins = Math.floor(expirySeconds / 60);
        const secs = expirySeconds % 60;
        expiryTimer.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;

        if (expirySeconds <= 60) {
          expiryTimer.style.color = 'var(--red)';
        }

        if (expirySeconds <= 0) {
          clearInterval(expiryInterval);
          expiryTimer.textContent = 'Expired';
          codeError.textContent = 'Code has expired. Please request a new one.';
          codeError.classList.remove('hidden');
          verifyBtn.disabled = true;
        }
      }, 1000);

      // ================================================================
      //  BACK BUTTON
      // ================================================================
      document.getElementById('backBtn').addEventListener('click', () => {
        window.history.back();
      });
    });
  </script>
</body>

</html>
